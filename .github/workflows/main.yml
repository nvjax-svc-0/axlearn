name: Scheduled Mirror Sync
on:
  schedule:
    - cron: '0 */2 * * *' # This runs every 2 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mirror
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: refresh workflow
        run: gh auth refresh -s workflow
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      - name: Sync Fork via GitHub API
        run: gh repo sync nvjax-svc-0/axlearn -b main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
